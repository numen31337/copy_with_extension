name: copy_with_extension_gen
version: 14.0.0
description: Automatically generating `copyWith` extensions code for classes with `@CopyWith()` annotation.
repository: https://github.com/numen31337/copy_with_extension
homepage: https://github.com/numen31337/copy_with_extension/tree/master/copy_with_extension_gen
issue_tracker: https://github.com/numen31337/copy_with_extension/issues
topics:
  - copy-with
  - code-generation
  - build-runner
  - immutability
  - codegen

environment:
  sdk: ^3.7.0

resolution: workspace

dependencies:
  analyzer: '>=8.1.1 <14.0.0'
  build: '>=4.0.0 <5.0.0'
  source_gen: '>=4.0.1 <5.0.0'
  copy_with_extension: ^14.0.0
  meta: ^1.15.0

dev_dependencies:
  equatable: ^2.0.7
  lints: '>=5.0.0 <7.0.0'
  build_runner: ^2.10.0
  # Required by the test stack on Dart 3.7+. Older 3.x releases look for the
  # removed `frontend_server.dart.snapshot` path and break lower-bound tests.
  frontend_server_client: ^4.0.0
  test: ^1.26.3
  source_gen_test: ^1.3.2
  coverage: ^1.15.0
